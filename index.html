<!DOCTYPE html>
<html>
<head>
    <title>DOM & jQuery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2 id="title">Hello Students</h2>

        <button onclick="changeText()">Change Text</button>
        <button onclick="changeColor()">Change Color</button>

        <br><br>

        <p id="msg">This is a paragraph.</p>

        <button id="hideBtn">Hide Paragraph</button>
        <button id="showBtn">Show Paragraph</button>
        <button id="toggleBtn">Toggle Paragraph</button>
        <button id="fadeBtn">Fade Paragraph</button>
        <button id="slideBtn">Slide Paragraph</button>
        <button id="animateBtn">Animate Paragraph</button>
    </div>

   
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
